apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkedin-frontend
  namespace: linkedin-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkedin-frontend
  template:
    metadata:
      labels:
        app: linkedin-frontend
    spec:
      containers:
        - name: linkedin-frontend
          image: docker.io/shubhratripathi16/linkedin-frontend:main-53-f581141a83c5
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_KEYCLOAK_URL
              value: http://a9099f2319da740c3b1c3e37813205aa-704837357.eu-west-2.elb.amazonaws.com
            - name: REACT_APP_KEYCLOAK_REALM
              value: linkedin-app
            - name: REACT_APP_KEYCLOAK_CLIENT_ID
              value: linkedin-frontend
            - name: REACT_APP_API_BASE_URL
              value: http://ac2511ef9149847f0ae9ed56e0f05ba3-876930999.eu-west-2.elb.amazonaws.com:8085
