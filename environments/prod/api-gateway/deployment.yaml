apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: linkedin-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: docker.io/shubhratripathi16/api-gateway:main-95-fb4f12b20073
          ports:
            - name: http
              containerPort: 8085
          envFrom:
            - configMapRef:
                name: linkedin-config
            - secretRef:
                name: linkedin-secrets
          env:
            - name: SPRING_APPLICATION_JSON
              value: |
                {"spring":{"cloud":{"gateway":{"server":{"webflux":{"routes":[{"id":"userprofile-service","uri":"http://userprofile-service:8083","predicates":["Path=/api/profiles,/api/profiles/**,/api/skills,/api/skills/**,/api/educations,/api/educations/**,/api/experiences,/api/experiences/**,/api/languages,/api/languages/**,/api/follows,/api/follows/**"],"filters":["RemoveRequestHeader=Origin"]},{"id":"search-discovery-service","uri":"http://search-service:8086","predicates":["Path=/api/search/**,/api/discovery/**"]},{"id":"trending-service","uri":"http://search-service:8086","predicates":["Path=/api/trending/**"],"filters":["RewritePath=/api/trending/(?<segment>.*), /api/discovery/trending/${segment}"]},{"id":"feed-and-timeline-service","uri":"http://feed-service:8087","predicates":["Path=/api/timeline,/api/timeline/**"],"filters":["RewritePath=/api/timeline$, /api/timeline/"]},{"id":"post-and-timeline-service","uri":"http://post-service:8088","predicates":["Path=/api/posts/**,/api/posts"]},{"id":"jobposting-service","uri":"http://jobposting-service:8091","predicates":["Path=/api/v1/jobs/**"],"filters":["RemoveRequestHeader=Origin"]},{"id":"payment-service","uri":"http://payment-service:8090","predicates":["Path=/api/payments,/api/payments/**"],"filters":["RewritePath=/api/payments/(?<segment>.*), /${segment}","RewritePath=/api/payments, /subscriptions","RemoveRequestHeader=Origin"]},{"id":"notification-service-root","uri":"http://notification-service:8090","predicates":["Path=/api/notifications"],"filters":["RewritePath=/api/notifications, /notifications"]},{"id":"notification-service","uri":"http://notification-service:8090","predicates":["Path=/api/notifications/**"],"filters":["RewritePath=/api/notifications/(?<segment>.*), /notifications/${segment}"]},{"id":"connections-service","uri":"http://connections-service:8093","predicates":["Path=/api/v1/connections/**"]},{"id":"userprofile-openapi","uri":"http://userprofile-service:8083","predicates":["Path=/v3/api-docs/userprofile"],"filters":["RewritePath=/v3/api-docs/userprofile, /api-docs"]},{"id":"feed-openapi","uri":"http://feed-service:8087","predicates":["Path=/v3/api-docs/feed"],"filters":["RewritePath=/v3/api-docs/feed, /v3/api-docs"]},{"id":"post-openapi","uri":"http://post-service:8088","predicates":["Path=/v3/api-docs/post"],"filters":["RewritePath=/v3/api-docs/post, /v3/api-docs"]},{"id":"search-openapi","uri":"http://search-service:8086","predicates":["Path=/v3/api-docs/search"],"filters":["RewritePath=/v3/api-docs/search, /v3/api-docs"]},{"id":"jobs-openapi","uri":"http://jobposting-service:8091","predicates":["Path=/v3/api-docs/jobs"],"filters":["RewritePath=/v3/api-docs/jobs, /v3/api-docs"]},{"id":"notifications-openapi","uri":"http://notification-service:8090","predicates":["Path=/v3/api-docs/notifications"],"filters":["RewritePath=/v3/api-docs/notifications, /v3/api-docs"]},{"id":"payments-openapi","uri":"http://payment-service:8090","predicates":["Path=/v3/api-docs/payments"],"filters":["RewritePath=/v3/api-docs/payments, /v3/api-docs"]}]}}}}},"springdoc":{"swagger-ui":{"path":"/swagger-ui.html","urls":[{"name":"User Profile API","url":"/v3/api-docs/userprofile"},{"name":"Feed API","url":"/v3/api-docs/feed"},{"name":"Post API","url":"/v3/api-docs/post"},{"name":"Search API","url":"/v3/api-docs/search"},{"name":"Jobs API","url":"/v3/api-docs/jobs"},{"name":"Notifications API","url":"/v3/api-docs/notifications"},{"name":"Payments API","url":"/v3/api-docs/payments"}]}}}
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opentelemetry/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: "api-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://adot-collector:4318"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_SAMPLER
              value: "traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.01"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
