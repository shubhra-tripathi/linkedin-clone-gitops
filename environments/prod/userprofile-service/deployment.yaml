env:
  - name: POSTGRES_URL
    value: jdbc:postgresql://$(RDS_HOST):$(RDS_PORT)/$(USERPROFILE_DB_NAME)
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: linkedin-secrets
        key: DB_USERNAME
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: linkedin-secrets
        key: DB_PASSWORD
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      configMapKeyRef:
        name: linkedin-config
        key: MSK_BOOTSTRAP_SERVERS