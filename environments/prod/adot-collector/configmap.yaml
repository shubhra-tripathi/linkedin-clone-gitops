apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-collector-config
  namespace: linkedin-prod
data:
  adot-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        limit_mib: 256
        spike_limit_mib: 64
        check_interval: 5s
      batch:
        timeout: 5s
        send_batch_size: 50

    exporters:
      awsxray:
        region: eu-west-2

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [awsxray]