apiVersion: apps/v1
kind: Deployment
metadata:
  name: adot-collector
  namespace: linkedin-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adot-collector
  template:
    metadata:
      labels:
        app: adot-collector
    spec:
      serviceAccountName: adot-collector
      containers:
        - name: adot-collector
          image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          args:
            - --config=/etc/adot/adot-collector-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            - name: adot-config
              mountPath: /etc/adot
      volumes:
        - name: adot-config
          configMap:
            name: adot-collector-config