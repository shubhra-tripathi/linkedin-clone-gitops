apiVersion: v1
kind: Service
metadata:
  name: grafana-public
  namespace: monitoring
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      targetPort: grafana
      protocol: TCP
