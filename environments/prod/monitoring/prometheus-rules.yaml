apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: linkedin-service-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: linkedin-prod.rules
      rules:
        - alert: LinkedInPodRestartingTooMuch
          expr: increase(kube_pod_container_status_restarts_total{namespace="linkedin-prod"}[10m]) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod is restarting too often"
            description: "Pod {{ $labels.pod }} container {{ $labels.container }} restarted more than twice in 10 minutes."
        - alert: LinkedInHighMemoryUsage
          expr: |
            (
              sum by (pod) (container_memory_working_set_bytes{namespace="linkedin-prod", container!="", image!=""})
              /
              sum by (pod) (kube_pod_container_resource_limits{namespace="linkedin-prod", resource="memory"})
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod memory usage is high"
            description: "Pod {{ $labels.pod }} is using more than 85% of its memory limit."
        - alert: LinkedInHighCPUUsage
          expr: |
            (
              sum by (pod) (rate(container_cpu_usage_seconds_total{namespace="linkedin-prod", container!="", image!=""}[5m]))
              /
              sum by (pod) (kube_pod_container_resource_limits{namespace="linkedin-prod", resource="cpu"})
            ) > 0.80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod CPU usage is high"
            description: "Pod {{ $labels.pod }} is using more than 80% of its CPU limit."
        - alert: LinkedInServiceDown
          expr: up{namespace="linkedin-prod", job=~".*service.*|api-gateway"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Service scrape target is down"
            description: "Prometheus target {{ $labels.job }} / {{ $labels.instance }} is down."
        - alert: LinkedInHighHttp5xxErrors
          expr: |
            sum by (service) (rate(http_server_requests_seconds_count{namespace="linkedin-prod", status=~"5.."}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "HTTP 5xx errors detected"
            description: "Service {{ $labels.service }} is returning 5xx responses."
