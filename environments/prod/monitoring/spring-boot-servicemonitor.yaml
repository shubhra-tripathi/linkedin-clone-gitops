apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: linkedin-spring-services
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - linkedin-prod
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - api-gateway
          - feed-service
          - post-service
          - search-service
          - userprofile-service
          - jobposting-service
          - notification-service
          - payment-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
