apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-admin-init
  namespace: jenkins
data:
  01-admin-user.groovy: |
    import hudson.security.FullControlOnceLoggedInAuthorizationStrategy
    import jenkins.model.Jenkins
    import hudson.security.HudsonPrivateSecurityRealm

    def instance = Jenkins.get()
    def username = System.getenv("JENKINS_ADMIN_ID") ?: "admin"
    def password = System.getenv("JENKINS_ADMIN_PASSWORD") ?: "admin12345"

    def realm = instance.getSecurityRealm()
    if (!(realm instanceof HudsonPrivateSecurityRealm)) {
      realm = new HudsonPrivateSecurityRealm(false)
      instance.setSecurityRealm(realm)
    }

    def user = realm.getUser(username)
    if (user == null) {
      realm.createAccount(username, password)
      println("Created Jenkins admin user '${username}'")
    } else {
      user.addProperty(hudson.security.HudsonPrivateSecurityRealm.Details.fromPlainPassword(password))
      println("Reset Jenkins admin user '${username}' password")
    }

    def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
    strategy.setAllowAnonymousRead(false)
    instance.setAuthorizationStrategy(strategy)
    instance.save()
